<svg width="100" height="100" viewBox="0 0 120 120" xmlns="http://w3.org">
  <defs>
    <linearGradient id="eventGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F80ED" />
      <stop offset="100%" stop-color="#43A047" />
    </linearGradient>
  </defs>
  <g transform="translate(15, 15) scale(0.75)">
    
    <!-- Corpo do Calendário -->
    <rect x="10" y="20" width="80" height="70" rx="8" fill="url(#eventGradient)"/>
    <path d="M10 45H90V50H10V45Z" fill="#1C5DB6" fill-opacity="0.3"/>
    
    <!-- Alças Superiores em Branco -->
    <rect x="25" y="5" width="12" height="20" rx="4" fill="#FFFFFF"/>
    <rect x="63" y="5" width="12" height="20" rx="4" fill="#FFFFFF"/>
    
    <!-- Grade de Dias em F8FAFC (Superfície) -->
    <rect x="22" y="58" width="10" height="10" rx="2" fill="#F8FAFC"/>
    <rect x="42" y="58" width="10" height="10" rx="2" fill="#F8FAFC"/>
    <rect x="62" y="58" width="10" height="10" rx="2" fill="#F8FAFC"/>
    <rect x="22" y="75" width="10" height="10" rx="2" fill="#F8FAFC"/>
    
    <!-- O "Check" do Evento Confirmado -->
    <path d="M62 78L68 84L80 72" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
